<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>WK 2026 Pronostiek</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--green:#00c853;--green-dark:#009624;--red:#e53935;--gold:#ffd600;--dark:#0a0f0d;--dark2:#111714;--dark3:#1a2420;--card:#1e2b26;--border:#2a3d35;--text:#e8f5e9;--muted:#7a9e8a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%;}
.app{display:flex;flex-direction:column;min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--dark2);border-bottom:2px solid var(--green);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200;}
.topbar-title{font-family:'Bebas Neue';font-size:22px;color:var(--green);letter-spacing:2px;}
.topbar-title span{color:var(--gold);}
.user-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.user-badge strong{color:var(--text);}
.btn-logout{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 9px;border-radius:5px;cursor:pointer;font-size:11px;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}

/* LAYOUT */
.main{display:flex;flex:1;position:relative;}
.sidebar{width:185px;background:var(--dark2);border-right:1px solid var(--border);padding:12px 0;flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:8px;padding:11px 15px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{background:var(--dark3);color:var(--text);}
.nav-item.active{background:var(--dark3);color:var(--green);border-left-color:var(--green);}
.content{flex:1;padding:18px;overflow-y:auto;max-width:960px;min-width:0;}

/* BOTTOM NAV (mobile) */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--dark2);border-top:1px solid var(--border);z-index:200;padding:4px 0 env(safe-area-inset-bottom,4px);}
.bottom-nav-items{display:flex;justify-content:space-around;}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;cursor:pointer;color:var(--muted);font-size:9px;flex:1;border:none;background:none;}
.bn-item.active{color:var(--green);}
.bn-icon{font-size:18px;}

/* MOBILE */
@media(max-width:640px){
  .sidebar{display:none;}
  .bottom-nav{display:block;}
  .content{padding:12px 10px 80px;}
  .topbar{height:48px;}
  .topbar-title{font-size:20px;}
  .login-box{width:calc(100vw - 32px);padding:32px 20px;}
}

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:40px 32px;width:360px;max-width:100%;}
.login-logo{font-family:'Bebas Neue';font-size:36px;color:var(--green);text-align:center;letter-spacing:3px;margin-bottom:2px;}
.login-sub{text-align:center;color:var(--muted);font-size:12px;margin-bottom:24px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.field input,.field select{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:6px;padding:11px 12px;color:var(--text);font-size:16px;font-family:inherit;outline:none;}
.field input:focus,.field select:focus{border-color:var(--green);}
.field select option{background:var(--dark3);}

/* BUTTONS */
.btn{width:100%;padding:13px;background:var(--green);color:#000;font-weight:600;border:none;border-radius:6px;cursor:pointer;font-size:15px;font-family:inherit;touch-action:manipulation;}
.btn:hover{background:var(--green-dark);color:#fff;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-sm{width:auto;padding:7px 14px;font-size:12px;border-radius:5px;touch-action:manipulation;}
.btn-outline{background:none;border:1px solid var(--green);color:var(--green);}
.btn-outline:hover{background:var(--green);color:#000;}
.btn-danger{background:var(--red);color:#fff;}
.btn-betaald{background:var(--green);color:#000;}
.btn-test{background:#7a9e8a22;border:1px solid var(--muted);color:var(--muted);}
.err{color:var(--red);font-size:12px;margin-top:5px;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
.card-title{font-family:'Bebas Neue';font-size:17px;color:var(--green);margin-bottom:10px;letter-spacing:1px;}
.section-title{font-family:'Bebas Neue';font-size:22px;color:var(--text);margin-bottom:14px;letter-spacing:1px;}

/* TABS */
.tabs{display:flex;gap:3px;margin-bottom:16px;background:var(--dark2);border-radius:6px;padding:3px;width:fit-content;flex-wrap:wrap;}
.tab{padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .15s;touch-action:manipulation;}
.tab.active{background:var(--card);color:var(--text);}

/* GROEPTABS */
.groep-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.groep-tab{padding:7px 11px;border-radius:5px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);background:var(--dark2);border:1px solid var(--border);font-family:'Bebas Neue';letter-spacing:1px;touch-action:manipulation;min-height:36px;}
.groep-tab.active{background:var(--green);color:#000;border-color:var(--green);}
.groep-tab.joker{border-color:var(--gold);color:var(--gold);}
.groep-tab.joker.active{background:var(--gold);color:#000;}

/* TAGS */
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;}
.tag-green{background:#00c85322;color:var(--green);}
.tag-gold{background:#ffd60022;color:var(--gold);}
.tag-red{background:#e5393522;color:var(--red);}
.tag-gray{background:#2a3d35;color:var(--muted);}
.tag-blue{background:#1565c022;color:#64b5f6;}
.tag-niet-betaald{background:#e5393533;color:#ff6b6b;border:1px solid #e5393566;}
.tag-test{background:#7a9e8a22;color:var(--muted);border:1px solid var(--border);}

/* KLASSEMENT */
.ranking{width:100%;border-collapse:collapse;}
.ranking th{text-align:left;font-size:10px;text-transform:uppercase;color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--border);letter-spacing:.3px;}
.ranking td{padding:9px 8px;border-bottom:1px solid var(--border);font-size:13px;}
.ranking tr:last-child td{border-bottom:none;}
.rank-num{font-family:'Bebas Neue';font-size:19px;color:var(--muted);}
.rank-1 .rank-num{color:var(--gold);}
.rank-2 .rank-num{color:#ccc;}
.rank-3 .rank-num{color:#cd7f32;}
.pts{font-family:'Bebas Neue';font-size:19px;color:var(--green);}
.pts.locked{color:var(--red);}

/* MATCHES */
.match-card{background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:9px;}
.match-card.joker-on{border-color:var(--gold);box-shadow:0 0 8px #ffd60018;}
.match-header{font-size:10px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.match-teams{display:flex;align-items:center;gap:8px;}
.team-name{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.team-name.right{text-align:right;}
.score-box{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.score-input{width:40px;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:6px 4px;color:var(--text);font-size:18px;font-family:'Bebas Neue';outline:none;}
.score-input:focus{border-color:var(--green);}
.score-sep{font-family:'Bebas Neue';font-size:16px;color:var(--muted);}
.score-display{font-family:'Bebas Neue';font-size:20px;color:var(--gold);min-width:44px;text-align:center;}
.real-score{font-family:'Bebas Neue';font-size:14px;color:var(--muted);min-width:44px;text-align:center;}
.match-result{font-size:10px;margin-top:5px;display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap;}
.joker-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:4px 10px;color:var(--muted);font-size:11px;font-family:inherit;cursor:pointer;touch-action:manipulation;}
.joker-btn.on{border-color:var(--gold);color:var(--gold);background:#ffd60012;}
.joker-btn:disabled{opacity:.3;cursor:not-allowed;}
.locked-msg{font-size:10px;color:var(--red);margin-top:4px;}

/* BIJVRAGEN */
.bv-card{background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:9px;}
.bv-q{font-size:13px;margin-bottom:8px;}
.bv-a{display:flex;gap:6px;align-items:center;}
.bv-a input,.bv-a select{flex:1;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:9px 10px;color:var(--text);font-family:inherit;outline:none;font-size:14px;min-width:0;}
.bv-a input:focus,.bv-a select:focus{border-color:var(--green);}
.bv-a select option{background:var(--dark2);}

/* PUNTENVRAGEN */
.pv-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:8px;}
.pv-row:last-child{border:none;}
.pv-num{font-family:'Bebas Neue';font-size:20px;min-width:36px;text-align:center;}
input[type=range]{-webkit-appearance:none;width:90px;height:4px;border-radius:2px;background:var(--border);outline:none;flex-shrink:0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold);cursor:pointer;}

/* GROEPSSTAND */
.stand-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:10px;}
.stand-table th{text-align:center;padding:5px 4px;color:var(--muted);font-size:9px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.stand-table th:first-child{text-align:left;padding-left:6px;}
.stand-table td{padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;}
.stand-table td:first-child{text-align:left;padding-left:6px;font-size:12px;}
.stand-table tr:last-child td{border-bottom:none;}
.stand-pos{font-family:'Bebas Neue';font-size:15px;color:var(--muted);margin-right:4px;}
.stand-pos.q{color:var(--green);}
.stand-pts{font-family:'Bebas Neue';font-size:15px;color:var(--green);}
.saldo-pos{color:var(--green);}
.saldo-neg{color:var(--red);}

/* FAIRPLAY DRAG */
.fp-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.fp-item{display:flex;align-items:center;gap:10px;background:var(--dark3);border:1px solid var(--border);border-radius:7px;padding:10px 12px;cursor:grab;user-select:none;touch-action:none;}
.fp-item.dragging{opacity:.5;border-color:var(--gold);}
.fp-rank{font-family:'Bebas Neue';font-size:20px;color:var(--muted);width:24px;}
.fp-rank.r1{color:var(--gold);}
.fp-rank.r2{color:#ccc;}
.fp-rank.r3{color:#cd7f32;}
.fp-rank.r4{color:var(--muted);}
.fp-name{flex:1;font-size:13px;}
.fp-handle{color:var(--muted);font-size:18px;}

/* MISC */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:480px){.grid2{grid-template-columns:1fr;}.grid3{grid-template-columns:1fr 1fr;}}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px;text-align:center;}
.stat-n{font-family:'Bebas Neue';font-size:32px;color:var(--green);line-height:1;}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.3px;}
.saved{display:inline-flex;align-items:center;gap:3px;color:var(--green);font-size:11px;opacity:0;transition:opacity .4s;}
.saved.show{opacity:1;}
.pb{height:3px;background:var(--dark3);border-radius:2px;margin-top:4px;overflow:hidden;}
.pb-fill{height:100%;background:var(--green);border-radius:2px;}
.pts-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.pts-row:last-child{border:none;}
.pp{color:var(--green);font-weight:600;}
.pn{color:var(--red);font-weight:600;}
.spinner{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:18px;color:var(--muted);}
.badge-admin{background:var(--gold);color:#000;font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;}
.badge-test{background:var(--muted);color:#000;font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;}
.ii{background:var(--dark3);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-family:inherit;outline:none;font-size:12px;}
.ii:focus{border-color:var(--green);}
.ii option{background:var(--dark2);}
.info{background:var(--dark3);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.6;}
.info strong{color:var(--text);}
.info-test{background:#7a9e8a11;border:1px solid var(--muted);border-radius:6px;padding:10px;font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.6;}
.info-deadline{background:#e5393511;border:1px solid var(--red);border-radius:6px;padding:10px;font-size:11px;color:#ff6b6b;margin-bottom:10px;}
.wt{width:100%;border-collapse:collapse;font-size:11px;}
.wt th{text-align:left;padding:4px 7px;color:var(--muted);font-size:9px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.wt td{padding:5px 7px;border-bottom:1px solid var(--border);}
.wt tr:last-child td{border:none;}
.gh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;}
.gt{font-size:11px;color:var(--muted);margin-top:2px;}
.betaal-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px;flex-wrap:wrap;}
.betaal-row:last-child{border:none;}
.pw-show{color:var(--text);font-family:monospace;font-size:12px;}
.pw-dot{color:var(--muted);}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const SURL='https://aomckthckwmynanbymgj.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvbWNrdGhja3dteW5hbmJ5bWdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDE4NzIsImV4cCI6MjA4OTQxNzg3Mn0.juHys0xPFlSYh3OL3mKiA5x-1Fm5aeEEn__WUWAsLzg';
const sb=supabase.createClient(SURL,SKEY);
const GRP=['A','B','C','D','E','F','G','H','I','J','K','L'];
const WK_LANDEN=['Algerije','Argentinië','Australië','België','Brazilië','Canada','Colombia','Curaçao','Duitsland','Ecuador','Egypte','Engeland','Frankrijk','Ghana','Haïti','IC-1 winner','IC-2 winner','Iran','Ivoorkust','Japan','Jordanië','Kaapverdië','Kroatië','Marokko','Mexico','Nederland','Nieuw-Zeeland','Noorwegen','Oezbekistan','Oostenrijk','Panama','Paraguay','PO-A winner','PO-B winner','PO-C winner','PO-D winner','Portugal','Qatar','Saudi-Arabië','Schotland','Senegal','Spanje','Tunesië','Uruguay','VS','Zuid-Afrika','Zuid-Korea','Zwitserland'].sort();

function fmt(n){if(typeof n!=='number')return n;return Number.isInteger(n)?n.toFixed(2):n.toFixed(2);}
function waaghals(h,a){if(h==null||a==null)return 0;const k=`${h}-${a}`;if(['1-0','0-1','1-1','2-1','1-2','2-0','0-2'].includes(k))return 0;if(['3-0','0-3','2-2','3-1','1-3','0-0'].includes(k))return 1;if(['4-0','0-4','3-2','2-3','4-1','1-4'].includes(k))return 2;return 4;}
function catMatch(pH,pA,rH,rA){if(pH==null||pA==null)return null;pH=parseInt(pH);pA=parseInt(pA);const eH=pH===rH,eA=pA===rA,pW=pH>pA?'H':pH<pA?'A':'D',rW=rH>rA?'H':rH<rA?'A':'D',wOk=pW===rW;if(eH&&eA)return'alles_juist';if((eH||eA)&&wOk)return'een_juist_winnaar_juist';if(!eH&&!eA&&wOk)return'niets_juist_winnaar_juist';if((eH||eA)&&!wOk)return'een_juist_winnaar_fout';return'alles_fout';}
function avgPT(pvs){const K=['alles_juist','een_juist_winnaar_juist','niets_juist_winnaar_juist','een_juist_winnaar_fout','alles_fout'],D={alles_juist:7,een_juist_winnaar_juist:5,niets_juist_winnaar_juist:4,een_juist_winnaar_fout:2,alles_fout:-2};if(!pvs||!pvs.length)return D;const r={};for(const k of K){const v=pvs.map(p=>p[k]).filter(x=>x!=null);r[k]=v.length?Math.trunc(v.reduce((a,b)=>a+b,0)/v.length*100)/100:D[k];}return r;}
function calcPts(pm,pb,matches,bvs,jids,pt,spelerStats,teldatum){
  const telPunten=!teldatum||new Date()>=new Date(teldatum);
  let tot=0;const det=[];const matchDet=[];
  for(const m of matches){
    if(m.home_score==null)continue;
    const p=pm[m.id];
    const isJ=jids.includes(m.id),isGF=GRP.includes(m.group);
    if(!p||p.home_pred==null){
      if(isGF)matchDet.push({group:m.group,matchId:m.id,home:m.home,away:m.away,homePred:null,awayPred:null,homeScore:m.home_score,awayScore:m.away_score,pts:0,isJ,cat:null,wb:0});
      continue;
    }
    const cat=catMatch(p.home_pred,p.away_pred,m.home_score,m.away_score);
    if(!cat)continue;
    const wb=isGF?waaghals(p.home_pred,p.away_pred):0,pts=(pt[cat]+wb)*(isJ?2:1);
    if(isGF)matchDet.push({group:m.group,matchId:m.id,home:m.home,away:m.away,homePred:p.home_pred,awayPred:p.away_pred,homeScore:m.home_score,awayScore:m.away_score,pts,isJ,cat,wb});
    if(pts!==0){tot+=pts;det.push({label:`${m.home}–${m.away}`,pts,isJ,cat,group:m.group,matchId:m.id,home:m.home,away:m.away,homePred:p.home_pred,awayPred:p.away_pred,homeScore:m.home_score,awayScore:m.away_score,wb});}
  }
  if(telPunten){
    for(const bv of bvs){
      if(bv.type==='speler3'){
        const namen=[pb[bv.id+'_1'],pb[bv.id+'_2'],pb[bv.id+'_3']].map(n=>n||'');
        if(namen.every(n=>!n.trim()))continue;
        let r;
        if(bv.id==='bv_kee') r=calcKeeperPunten(bv.id,namen,spelerStats||[]);
        else r=calcSpeler3Punten(bv.id,namen,spelerStats||[]);
        if(r.tot!==0){tot+=r.tot;det.push({label:bv.question,pts:r.tot,cat:'speler3'});}
      } else {
        if(!bv.correct_answer)continue;
        const a=pb[bv.id];
        if(a&&a.toLowerCase().trim()===bv.correct_answer.toLowerCase().trim()){tot+=bv.points;det.push({label:bv.question,pts:bv.points,cat:'bijvraag'});}
      }
    }
  }
  return{tot,det,matchDet,bijvragenGeteld:telPunten};
}
function isDeadlinePassed(d){if(!d)return false;return new Date()>new Date(d);}

// ─── SPELER3 PUNTENTELLING ────────────────────────────────────────────────────
// Topschutter & assistkoning: punten = som van doelpunten/assists van gekozen spelers
function calcSpeler3Punten(bvId, gekozenNamen, spelerStats){
  const stats=spelerStats.filter(s=>s.bv_id===bvId);
  let tot=0;const det=[];
  for(const naam of gekozenNamen){
    if(!naam||!naam.trim())continue;
    const st=stats.find(s=>s.naam.toLowerCase().trim()===naam.toLowerCase().trim());
    if(st&&st.stat1){tot+=Number(st.stat1);det.push({naam,pts:Number(st.stat1)});}
  }
  return{tot,det};
}

// Keeper ranking: cleansheets - (tegendoelpunten / spelminuten)
function calcKeeperRanking(spelerStats, bvId){
  const stats=spelerStats.filter(s=>s.bv_id===bvId&&s.stat3>0);
  return stats.map(s=>({
    naam:s.naam,
    score:Number(s.stat1)-(Number(s.stat2)/Number(s.stat3)),
    cleansheets:Number(s.stat1),
    tegendoelen:Number(s.stat2),
    minuten:Number(s.stat3),
  })).sort((a,b)=>b.score-a.score);
}

function calcKeeperPunten(bvId, gekozenNamen, spelerStats){
  const ranking=calcKeeperRanking(spelerStats,bvId);
  const top3=ranking.slice(0,3).map(r=>r.naam.toLowerCase().trim());
  let tot=0;const det=[];
  gekozenNamen.forEach((naam,pos)=>{
    if(!naam||!naam.trim())return;
    const nl=naam.toLowerCase().trim();
    const inTop3=top3.includes(nl);
    const exactPos=top3[pos]===nl;
    let pts=0;
    if(inTop3){pts+=5;if(exactPos){const bonus=[6,3,2][pos]||0;pts+=bonus;}}
    if(pts>0){tot+=pts;det.push({naam,pts,inTop3,exactPos,pos});}
  });
  return{tot,det};
}

// Bouw basisstatistieken voor een set ploegen op basis van wedstrijden+scores
function buildStats(teamList, matches, scores){
  const st={};
  for(const t of teamList)st[t]={team:t,pts:0,gs:0,ga:0,gd:0,w:0,d:0,l:0,played:0};
  for(const m of matches){
    if(!teamList.includes(m.home)||!teamList.includes(m.away))continue;
    const s=scores[m.id];
    if(!s||s.h==null||s.a==null)continue;
    const h=parseInt(s.h),a=parseInt(s.a);
    if(isNaN(h)||isNaN(a))continue;
    st[m.home].played++;st[m.away].played++;
    st[m.home].gs+=h;st[m.home].ga+=a;
    st[m.away].gs+=a;st[m.away].ga+=h;
    if(h>a){st[m.home].pts+=3;st[m.home].w++;st[m.away].l++;}
    else if(h<a){st[m.away].pts+=3;st[m.away].w++;st[m.home].l++;}
    else{st[m.home].pts+=1;st[m.away].pts+=1;st[m.home].d++;st[m.away].d++;}
  }
  for(const t of teamList)st[t].gd=st[t].gs-st[t].ga;
  return st;
}

// Vergelijk twee ploegen op basis van onderlinge criteria (crit 3-5)
function cmpUnderlinge(a,b,matches,scores){
  const st=buildStats([a.team,b.team],matches,scores);
  const sa=st[a.team],sb=st[b.team];
  if(sb.pts!==sa.pts)return sb.pts-sa.pts;
  if(sb.gd!==sa.gd)return sb.gd-sa.gd;
  if(sb.gs!==sa.gs)return sb.gs-sa.gs;
  return 0;
}

// Volledige FIFA groepsstand met correcte tiebreaker volgorde
// fpRanking = array van teamnamen gesorteerd op fairplay (index 0 = beste)
// fifaRanking = array van {team, rank} gesorteerd op rank
function buildStand(matches, scores, fpRanking, fifaRanking){
  const teams=new Set();
  for(const m of matches){if(m.home)teams.add(m.home);if(m.away)teams.add(m.away);}
  const teamList=[...teams];
  const st=buildStats(teamList,matches,scores);
  const rows=Object.values(st);

  function fpScore(team){
    if(!fpRanking||!Array.isArray(fpRanking))return 0;
    const idx=fpRanking.indexOf(team);
    if(idx===-1)return 0;
    return teamList.length-idx;
  }

  function fifaScore(team){
    if(!fifaRanking||!Array.isArray(fifaRanking))return 9999;
    const entry=fifaRanking.find(r=>r.team===team);
    return entry?entry.rank:9999; // lager = beter
  }

  function getUnderlinge(group){
    const names=group.map(r=>r.team);
    return buildStats(names,matches,scores);
  }

  function cmpOnderlinge(a, b, und){
    const ua=und[a.team],ub=und[b.team];
    if(!ua||!ub)return 0;
    if(ub.pts!==ua.pts)return ub.pts-ua.pts;
    if(ub.gd!==ua.gd)return ub.gd-ua.gd;
    if(ub.gs!==ua.gs)return ub.gs-ua.gs;
    return 0;
  }

  function sortGelijk(group){
    if(group.length<=1)return group;
    const und=getUnderlinge(group);
    const sorted=[...group].sort((a,b)=>cmpOnderlinge(a,b,und));
    const result=[];
    let i=0;
    while(i<sorted.length){
      let j=i+1;
      while(j<sorted.length&&cmpOnderlinge(sorted[i],sorted[j],und)===0)j++;
      const subGroup=sorted.slice(i,j);
      if(subGroup.length>1&&subGroup.length<group.length){
        const und2=getUnderlinge(subGroup);
        subGroup.sort((a,b)=>cmpOnderlinge(a,b,und2));
      }
      result.push(...subGroup);
      i=j;
    }
    return result;
  }

  rows.sort((a,b)=>b.pts-a.pts);

  const final=[];
  let i=0;
  while(i<rows.length){
    let j=i+1;
    while(j<rows.length&&rows[j].pts===rows[i].pts)j++;
    const gelijkePunten=rows.slice(i,j);
    if(gelijkePunten.length===1){
      final.push(gelijkePunten[0]);
    } else {
      const gesorteerd=sortGelijk(gelijkePunten);
      gesorteerd.sort((a,b)=>{
        const und=getUnderlinge(gelijkePunten);
        const ondCmp=cmpOnderlinge(a,b,und);
        if(ondCmp!==0)return ondCmp;
        // 5. Doelsaldo alle wedstrijden
        if(b.gd!==a.gd)return b.gd-a.gd;
        // 6. Goals gescoord alle wedstrijden
        if(b.gs!==a.gs)return b.gs-a.gs;
        // 7. Fairplay drag & drop
        const fpA=fpScore(a.team),fpB=fpScore(b.team);
        if(fpB!==fpA)return fpB-fpA;
        // 8. FIFA wereldranking (lager getal = beter)
        const frA=fifaScore(a.team),frB=fifaScore(b.team);
        if(frA!==frB)return frA-frB;
        // 9. Alfabetisch
        return a.team.localeCompare(b.team);
      });
      final.push(...gesorteerd);
    }
    i=j;
  }

  return final;
}

// Bereken winnaar/runner-up/derden voor alle groepen op basis van pronostiek
function calcKOTeams(matches, lPM, lFP, fifaRanking){
  const mbg={};
  for(const m of matches){if(!mbg[m.group])mbg[m.group]=[];mbg[m.group].push(m);}

  const winnaars={},runners={},derden=[];
  for(const grp of GRP){
    const gm=mbg[grp]||[];
    if(!gm.length)continue;
    const scV={};
    for(const m of gm){const p=lPM[m.id];if(p&&p.home_pred!=null)scV[m.id]={h:p.home_pred,a:p.away_pred};}
    const stand=buildStand(gm,scV,lFP[grp],fifaRanking);
    if(stand.length>=1)winnaars[grp]=stand[0].team;
    if(stand.length>=2)runners[grp]=stand[1].team;
    if(stand.length>=3)derden.push({...stand[2],grp});
  }

  // Sorteer derden en pak top 8
  const top8Derden=[...derden].sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    if(b.gd!==a.gd)return b.gd-a.gd;
    if(b.gs!==a.gs)return b.gs-a.gs;
    if(b.w!==a.w)return b.w-a.w;
    return a.team.localeCompare(b.team);
  }).slice(0,8).map(d=>d.team);

  return{winnaars,runners,top8Derden};
}

// Bereken punten voor knock-out pronostieken
// Bereken punten voor knock-out pronostieken
// Juiste match (team in juiste wedstrijd van die ronde) → koPunten[round+'_juist']
// Wel in ronde maar verkeerde match → koPunten[round+'_aanwezig']
function calcKOPts(koPronos, koMatches, koPunten){
  let tot=0;const det=[];
  const rounds=['R32','R16','KF','HF','KF3','F'];

  // Bouw per match de echte teams op basis van winnaars vorige ronde
  const echteTeamsPerMatch={};
  for(const round of rounds){
    const rMatches=koMatches.filter(m=>m.round===round).sort((a,b)=>a.position-b.position);
    for(const m of rMatches){
      if(round==='R32'){
        echteTeamsPerMatch[m.id]=[m.home,m.away].filter(Boolean);
      } else if(round==='KF3'){
        const hfMatches=koMatches.filter(x=>x.round==='HF').sort((a,b)=>a.position-b.position);
        const verliezers=hfMatches.flatMap(hm=>{
          const t=[hm.home,hm.away].filter(Boolean);
          return hm.winner?t.filter(x=>x!==hm.winner):[];
        });
        echteTeamsPerMatch[m.id]=verliezers.slice(0,2);
      } else {
        const prevRound={R16:'R32',KF:'R16',HF:'KF',F:'HF'}[round];
        const prevMatches=koMatches.filter(x=>x.round===prevRound).sort((a,b)=>a.position-b.position);
        const idx=(m.position-1)*2;
        echteTeamsPerMatch[m.id]=[prevMatches[idx]?.winner,prevMatches[idx+1]?.winner].filter(Boolean);
      }
    }
  }

  // Bouw per ronde een set van alle teams die in die ronde zitten
  const teamsInRonde={};
  for(const round of rounds){
    teamsInRonde[round]=new Set();
    for(const m of koMatches.filter(x=>x.round===round)){
      for(const t of (echteTeamsPerMatch[m.id]||[])) teamsInRonde[round].add(t);
    }
  }

  // Bereken punten per match
  for(const m of koMatches){
    const p=koPronos[m.id];
    if(!p)continue;
    const ptsJuist=koPunten[m.round+'_juist']??2;
    const ptsAanwezig=koPunten[m.round+'_aanwezig']??1;
    const teamsInDezeMatch=echteTeamsPerMatch[m.id]||[];
    const inDezeMatch=teamsInDezeMatch.some(t=>t.toLowerCase().trim()===p.toLowerCase().trim());
    const inDezeRonde=(teamsInRonde[m.round]||new Set()).has(p);
    if(inDezeMatch){
      tot+=ptsJuist;det.push({label:`🎯 ${p} (juiste match)`,pts:ptsJuist,round:m.round,cat:'juist'});
    } else if(inDezeRonde){
      tot+=ptsAanwezig;det.push({label:`✓ ${p} (in ronde)`,pts:ptsAanwezig,round:m.round,cat:'aanwezig'});
    }
  }
  return{tot,det};
}

// Bereken de echte KO-teams op basis van echte uitslagen + admin fairplay

  const mbg={};

  for(const grp of GRP){
    const gm=mbg[grp]||[];
    if(!gm.length||gm.some(m=>m.home_score==null))continue;
    const scE={};for(const m of gm)scE[m.id]={h:m.home_score,a:m.away_score};
    let fp=adminFP?.[grp];
    if(typeof fp==='string'){try{fp=JSON.parse(fp);}catch{fp=null;}}

    if(stand.length>=3)derden.push({...stand[2],pos:'3',grp});
  }
  const top8Derden=[...derden].sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    if(b.gd!==a.gd)return b.gd-a.gd;
    if(b.gs!==a.gs)return b.gs-a.gs;
    if(b.w!==a.w)return b.w-a.w;
    return a.team.localeCompare(b.team);
  }).slice(0,8);
  const result={};
  for(const g of Object.values(winnaars))result[g.team]={pos:g.pos,grp:g.grp};
  for(const g of Object.values(runners))result[g.team]={pos:g.pos,grp:g.grp};
  for(const d of top8Derden)result[d.team]={pos:'3',grp:d.grp};
  return result;
}

// Bereken kwalificatiepunten (groepsfase → KO)
function calcKwalPunten(pm, fpData, matches, koPunten, adminFP){
  const ptsJuist=koPunten['kwal_juist']??2;
  const ptsAanwezig=koPunten['kwal_aanwezig']??1;
  const echteKO=calcEchteKOTeams(matches,adminFP||{});
  if(!Object.keys(echteKO).length)return{tot:0,det:[]};
  const voorspeld=calcVoorspeldeKOTeams(matches,pm,fpData);
  let tot=0;const det=[];
  for(const [team,eInfo] of Object.entries(echteKO)){
    const vInfo=voorspeld[team];
    if(!vInfo)continue;
    if(vInfo.pos===eInfo.pos&&vInfo.grp===eInfo.grp){
      tot+=ptsJuist;det.push({label:`${team} (juiste plaats)`,pts:ptsJuist,cat:'kwal_juist'});
    } else {
      tot+=ptsAanwezig;det.push({label:`${team} (naar KO)`,pts:ptsAanwezig,cat:'kwal_aanwezig'});
    }
  }
  return{tot,det};
}
function FairplayRanking({teams,value,onChange,locked}){
  const [order,setOrder]=useState(value&&value.length===teams.length?value:[...teams]);
  const dragIdx=useRef(null);
  const touchStartY=useRef(null);
  const touchItem=useRef(null);
  const isDragging=useRef(false);

  useEffect(()=>{
    // Niet resetten tijdens slepen
    if(isDragging.current)return;
    if(value&&value.length===teams.length)setOrder(value);
    else setOrder([...teams]);
  },[JSON.stringify(teams),JSON.stringify(value)]);

  function onDragStart(i){dragIdx.current=i;isDragging.current=true;}
  function onDragOver(e,i){
    e.preventDefault();
    if(dragIdx.current===null||dragIdx.current===i)return;
    const newOrder=[...order];
    const [moved]=newOrder.splice(dragIdx.current,1);
    newOrder.splice(i,0,moved);
    dragIdx.current=i;
    setOrder(newOrder);
  }
  function onDragEnd(){dragIdx.current=null;isDragging.current=false;onChange(order);}

  function onTouchStart(e,i){
    touchStartY.current=e.touches[0].clientY;
    touchItem.current=i;
    isDragging.current=true;
  }
  function onTouchMove(e){
    e.preventDefault();
    const dy=e.touches[0].clientY-touchStartY.current;
    const itemH=48;
    const steps=Math.round(dy/itemH);
    if(steps===0||touchItem.current===null)return;
    const newIdx=Math.max(0,Math.min(order.length-1,touchItem.current+steps));
    if(newIdx===touchItem.current)return;
    const newOrder=[...order];
    const[moved]=newOrder.splice(touchItem.current,1);
    newOrder.splice(newIdx,0,moved);
    touchItem.current=newIdx;
    touchStartY.current=e.touches[0].clientY;
    setOrder(newOrder);
  }
  function onTouchEnd(){touchItem.current=null;isDragging.current=false;onChange(order);}

  const rankCls=['r1','r2','r3','r4'];
  return(<div className="fp-list">
    {order.map((t,i)=>(
      <div key={t}
        className={`fp-item${locked?' locked':''}`}
        draggable={!locked}
        onDragStart={()=>onDragStart(i)}
        onDragOver={e=>onDragOver(e,i)}
        onDragEnd={onDragEnd}
        onTouchStart={e=>onTouchStart(e,i)}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        style={{opacity:locked?.6:1,cursor:locked?'default':'grab'}}
      >
        <div className={`fp-rank ${rankCls[i]}`}>{i+1}</div>
        <div className="fp-name">{t}</div>
        {!locked&&<div className="fp-handle">⠿</div>}
      </div>
    ))}
    {locked&&<div style={{fontSize:10,color:'var(--red)',marginTop:4}}>🔒 Groepsfase gestart — niet meer wijzigbaar</div>}
  </div>);}

// PRONOSTIEK
function Pronostiek({matches,bvs,pmAll,pbAll,jAll,fpAll,cur,config,spelerStats,koMatches,koPronosAll,koPunten,fifaRanking,initialTab,onRefresh}){

  const[lPM,setLPM]=useState(myPM),[lPB,setLPB]=useState(myPB),[lJ,setLJ]=useState(myJ),[lFP,setLFP]=useState(myFP),[tab,setTab]=useState(initialTab||'bijvragen'),[saved,setSaved]=useState(false);
  const timer=useRef(null);

        <div style={{fontFamily:'Bebas Neue',fontSize:19,color:'var(--gold)',letterSpacing:1,marginBottom:12}}>
          Ranking 3de gerangschikte ploegen
        </div>
        <div className="info">
          Top 8 van de 12 derden gaan door naar de volgende ronde. Criteria: 1) Punten · 2) Doelsaldo · 3) Goals voor · 4) Overwinningen
        </div>
        {derden.length===0&&<div style={{color:'var(--muted)',fontSize:13}}>Vul eerst wedstrijden in bij de groepstabs.</div>}
        {gesorteerd.length>0&&<div className="card">
          <table className="stand-table">
            <thead><tr>
              <th style={{textAlign:'left'}}>Pos</th>
              <th style={{textAlign:'left'}}>Ploeg</th>
              <th style={{textAlign:'left'}}>Groep</th>
              <th>G</th><th>W</th><th>G</th><th>V</th>
              <th>+</th><th>-</th><th>SD</th><th>Ptn</th>
            </tr></thead>
            <tbody>
              {gesorteerd.map((r,i)=>(
                <tr key={r.team} style={{background:i<8?'var(--dark3)':'transparent'}}>
                  <td>
                    <span className={`stand-pos ${i<8?'q':''}`}>{i+1}</span>
                    {i===7&&<span style={{fontSize:9,color:'var(--muted)',display:'block'}}>── grens</span>}
                  </td>
                  <td style={{fontWeight:500}}>{r.team}</td>
                  <td><span className="tag tag-gray">{r.grp}</span></td>
                  <td>{r.played}</td><td>{r.w}</td><td>{r.d}</td><td>{r.l}</td>
                  <td>{r.gs}</td><td>{r.ga}</td>
                  <td className={r.gd>0?'saldo-pos':r.gd<0?'saldo-neg':''}>{r.gd>0?'+':''}{r.gd}</td>
                  <td><span className="stand-pts">{r.pts}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{marginTop:8,fontSize:10,color:'var(--muted)'}}>🟢 = kwalificeert (top 8)</div>
        </div>}

        {/* Incomplete groepen melding */}
        {GRP.filter(g=>{
          const gm=mbg[g]||[];
          const scV={};for(const m of gm){const p=lPM[m.id];if(p&&p.home_pred!=null)scV[m.id]={h:p.home_pred,a:p.away_pred};}
          return Object.keys(scV).length<gm.length;
        }).length>0&&<div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>
          ⚠️ Nog niet alle wedstrijden ingevuld — ranking is voorlopig.
        </div>}
      </div>);
    })()}

    {/* KNOCK-OUT FASE */}
    {tab==='ko'&&(()=>{
      const{winnaars,runners,top8Derden}=calcKOTeams(matches,lPM,lFP,fifaRanking);
      const ROUNDS=[
        {id:'R32',label:'Ronde van 32',matches:koMatches.filter(m=>m.round==='R32')},
        {id:'R16',label:'Ronde van 16',matches:koMatches.filter(m=>m.round==='R16')},
        {id:'KF',label:'Kwartfinales',matches:koMatches.filter(m=>m.round==='KF')},
        {id:'HF',label:'Halve finales',matches:koMatches.filter(m=>m.round==='HF')},
        {id:'KF3',label:'Kleine finale',matches:koMatches.filter(m=>m.round==='KF3')},
        {id:'F',label:'Finale',matches:koMatches.filter(m=>m.round==='F')},
      ];

      // Bereken beschikbare ploegen per ronde op basis van lKO keuzes
      function getTeamsForRound(round){
        if(round==='R32'){
          // Alle 48 groepsploegen
          const all=new Set();
          for(const m of matches){if(m.home)all.add(m.home);if(m.away)all.add(m.away);}
          return[...all].sort();
        }
        // Voor latere rondes: winnaars van vorige ronde op basis van lKO
        const prevRound={R16:'R32',KF:'R16',HF:'KF',KF3:'HF',F:'HF'}[round];
        const prevMatches=koMatches.filter(m=>m.round===prevRound);
        return prevMatches.map(m=>lKO[m.id]).filter(Boolean).sort();
      }

      // Bereken de 2 specifieke ploegen voor een R32 match
      function getMatchTeams(m){
        if(m.round==='R32'){
          return getR32Teams(m.id,winnaars,runners,top8Derden);
        }
        // Voor latere rondes: winnaars van de 2 vorige matches
        const prevRound={R16:'R32',KF:'R16',HF:'KF',KF3:'HF',F:'HF'}[m.round];
        if(!prevRound)return[];
        const prevMatches=koMatches.filter(x=>x.round===prevRound).sort((a,b)=>a.position-b.position);
        // home = winnaar van match op positie 2*pos-2, away = positie 2*pos-1
        const idx=(m.position-1)*2;
        const pm1=prevMatches[idx],pm2=prevMatches[idx+1];
        // Voor KF3: verliezers van HF
        if(m.round==='KF3'){
          const hfMatches=koMatches.filter(x=>x.round==='HF').sort((a,b)=>a.position-b.position);
          const hfWinners=hfMatches.map(hm=>lKO[hm.id]).filter(Boolean);
          const hfTeams=hfMatches.flatMap(hm=>getMatchTeams(hm));
          return hfTeams.filter(t=>!hfWinners.includes(t)).slice(0,2);
        }
        return[pm1?lKO[pm1.id]:null,pm2?lKO[pm2.id]:null].filter(Boolean);
      }

      return(<div>
        <div style={{fontFamily:'Bebas Neue',fontSize:19,color:'var(--green)',letterSpacing:1,marginBottom:8}}>
          🏆 Knock-out Fase
        </div>
        <div className="info" style={{marginBottom:12}}>
          Kies per wedstrijd wie je verwacht te winnen. De opties zijn gebaseerd op jouw groepspronostiek.
        </div>
        {!Object.keys(winnaars).length&&<div style={{color:'var(--muted)',fontSize:13,marginBottom:12}}>
          ⚠️ Vul eerst de groepswedstrijden in — dan verschijnen de ploegen automatisch.
        </div>}
        {ROUNDS.map(r=>(
          <div key={r.id} style={{marginBottom:16}}>
            <div style={{fontFamily:'Bebas Neue',fontSize:15,letterSpacing:1,color:'var(--muted)',marginBottom:6,display:'flex',alignItems:'center',gap:8}}>
              {r.label}
              <span style={{fontSize:11,color:'var(--gold)',fontFamily:'DM Sans'}}>
                <span style={{color:'var(--green)'}}>{koPunten[r.id+'_juist']??2}pt</span>
                <span style={{color:'var(--muted)',fontSize:10}}>/</span>
                <span style={{color:'var(--gold)'}}>{koPunten[r.id+'_aanwezig']??1}pt</span>
              </span>
            </div>
            {r.matches.map(m=>{
              const teams=getMatchTeams(m);
              const gekozen=lKO[m.id]||'';
              const isReal=!!m.winner;
              const correct=isReal&&gekozen&&gekozen===m.winner;
              const fout=isReal&&gekozen&&gekozen!==m.winner;
              return(<div key={m.id} className="match-card" style={{marginBottom:6}}>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <div style={{fontSize:11,color:'var(--muted)',minWidth:20,textAlign:'center'}}>{m.position}</div>
                  {teams.length>=2?(
                    <select
                      value={gekozen}
                      onChange={e=>saveKO(m.id,e.target.value)}
                      style={{flex:1,background:'var(--card)',border:`1px solid ${correct?'var(--green)':fout?'var(--red)':'var(--border)'}`,borderRadius:6,padding:'8px 10px',color:gekozen?'var(--text)':'var(--muted)',fontFamily:'inherit',fontSize:13,outline:'none',cursor:'pointer'}}
                    >
                      <option value="">— Kies winnaar —</option>
                      {teams.map(t=><option key={t} value={t}>{t}</option>)}
                    </select>
                  ):(
                    <div style={{flex:1,fontSize:12,color:'var(--muted)',fontStyle:'italic'}}>
                      {teams.length===1?`${teams[0]} vs ?`:'Vul vorige ronde in'}
                    </div>
                  )}
                  {isReal&&<span className={`tag ${correct?'tag-green':'tag-red'}`}>{correct?'✓':'✗'} {m.winner}</span>}
                  {!isReal&&gekozen&&<span style={{fontSize:11,color:'var(--gold)'}}>→ {gekozen}</span>}
                </div>
                {teams.length>=2&&<div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--muted)',marginTop:3,paddingLeft:28}}>
                  <span>{teams[0]}</span><span>vs</span><span>{teams[1]}</span>
                </div>}
              </div>);
            })}
          </div>
        ))}
      </div>);
    })()}
  </div>);}

// PUNTENVRAGEN
function PuntenVragen({cur,pvAll,users,onRefresh}){
  const my=pvAll.find(p=>p.user_id===cur.id);
  // null = niet ingevuld (telt niet mee voor gemiddelde)
  const[vals,setVals]=useState({
    alles_juist:my?my.alles_juist:null,
    een_juist_winnaar_juist:my?my.een_juist_winnaar_juist:null,
    niets_juist_winnaar_juist:my?my.niets_juist_winnaar_juist:null,
    een_juist_winnaar_fout:my?my.een_juist_winnaar_fout:null,
    alles_fout:my?my.alles_fout:null,
  }),[saved,setSaved]=useState(false);
  const echteUserIds=new Set(users.filter(u=>!u.is_admin&&!u.is_test).map(u=>u.id));
  const avg=avgPT(pvAll.filter(p=>echteUserIds.has(p.user_id)));
  const vr=[
    {k:'alles_juist',l:'Alles juist',min:4,max:10,c:'var(--green)'},
    {k:'een_juist_winnaar_juist',l:'1 juist + winnaar juist',min:3,max:8,c:'var(--green)'},
    {k:'niets_juist_winnaar_juist',l:'Niets juist + winnaar juist',min:2,max:6,c:'var(--gold)'},
    {k:'een_juist_winnaar_fout',l:'1 juist + winnaar fout',min:1,max:4,c:'var(--gold)'},
    {k:'alles_fout',l:'Alles fout',min:-5,max:0,c:'var(--red)'},
  ];

  // Bouw opties per categorie
  function opties(min,max){
    const opts=[];
    for(let i=max;i>=min;i--)opts.push(i);
    return opts;
  }

  async function save(nv){
    // Sla enkel op als alle waarden ingevuld zijn
    const alleIngevuld=Object.values(nv).every(v=>v!==null&&v!==undefined);
    if(!alleIngevuld)return;
    await sb.from('punten_vragen').upsert({user_id:cur.id,...nv},{onConflict:'user_id'});
    setSaved(true);setTimeout(()=>setSaved(false),1800);onRefresh();
  }

  function hC(k,v){
    const nv={...vals,[k]:v===''?null:parseInt(v)};
    setVals(nv);
    // Auto-save zodra alle velden ingevuld zijn
    const alleIngevuld=Object.values(nv).every(x=>x!==null&&x!==undefined);
    if(alleIngevuld)save(nv);
  }

  const alleIngevuld=Object.values(vals).every(v=>v!==null&&v!==undefined);
  const aantalIngevuld=Object.values(vals).filter(v=>v!==null&&v!==undefined).length;

  return(<div>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      <div className="section-title" style={{margin:0}}>🎚️ Puntenvragen</div>
      <span className={`saved ${saved?'show':''}`}>✓ Opgeslagen</span>
    </div>
    {cur.is_test&&<div className="info-test">🧪 Jouw puntenverdeling telt niet mee voor het gemiddelde.</div>}
    <div className="info">
      <strong>Hoe werkt dit?</strong> Jij bepaalt hoeveel punten elke categorie waard is. Het gemiddelde van alle ingevulde deelnemers = de officiële puntentabel.<br/>
      <strong>Belangrijk:</strong> Zolang je niet alle 5 vragen hebt ingevuld, telt jouw keuze <strong>niet</strong> mee voor het gemiddelde.
    </div>

    {!alleIngevuld&&<div className="info-deadline" style={{marginBottom:12}}>
      ⚠️ {aantalIngevuld}/5 ingevuld — vul alle vragen in om mee te tellen voor het gemiddelde.
    </div>}

    <div className="card">
      <div className="card-title">Jouw puntenverdeling</div>
      {vr.map(v=>{
        const opts=opties(v.min,v.max);
        const val=vals[v.k];
        return(
          <div key={v.k} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)',gap:10}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13}}>{v.l}</div>
              <div style={{fontSize:9,color:'var(--muted)'}}>Kies tussen {v.min} en {v.max}</div>
            </div>
            <select
              value={val===null||val===undefined?'':val}
              onChange={e=>hC(v.k,e.target.value)}
              style={{background:'var(--dark3)',border:`1px solid ${val!==null?v.c:'var(--border)'}`,borderRadius:6,padding:'7px 10px',color:val!==null?v.c:'var(--muted)',fontFamily:'Bebas Neue',fontSize:18,outline:'none',flexShrink:0,width:80,textAlign:'center',cursor:'pointer'}}
            >
              <option value="">–</option>
              {opts.map(o=><option key={o} value={o} style={{color:'var(--text)'}}>{o>0?'+':''}{o}</option>)}
            </select>
          </div>
        );
      })}
      {alleIngevuld&&<div style={{marginTop:10,fontSize:12,color:'var(--green)'}}>✅ Alle vragen ingevuld — jouw keuze telt mee voor het gemiddelde.</div>}
    </div>

    <div className="card"><div className="card-title">Huidig gemiddelde</div>
      <table className="wt"><thead><tr><th>Categorie</th><th>Jij</th><th>Gemiddelde</th></tr></thead><tbody>
        {vr.map(v=>{
          const val=vals[v.k];
          return(<tr key={v.k}>
            <td>{v.l}</td>
            <td style={{color:val!==null?v.c:'var(--muted)'}}><strong>{val!==null?(val>0?'+':'')+fmt(val):'–'}</strong></td>
            <td style={{color:'var(--muted)'}}>{avg[v.k]>0?'+':''}{fmt(avg[v.k])}</td>
          </tr>);
        })}
      </tbody></table>
    </div>

    <div className="card"><div className="card-title">🎯 Waaghalsbonus</div>
      <table className="wt"><thead><tr><th>Uitslagen</th><th>Bonus</th></tr></thead><tbody>
        <tr><td>1-0 / 0-1 / 1-1 / 2-1 / 1-2 / 2-0 / 0-2</td><td><span className="tag tag-gray">+0</span></td></tr>
        <tr><td>3-0 / 0-3 / 2-2 / 3-1 / 1-3 / 0-0</td><td><span className="tag tag-gold">+1</span></td></tr>
        <tr><td>4-0 / 0-4 / 3-2 / 2-3 / 4-1 / 1-4</td><td><span className="tag tag-gold">+2</span></td></tr>
        <tr><td>Alle andere (bv. 4-2 / 6-0 / ...)</td><td><span className="tag tag-green">+4</span></td></tr>
      </tbody></table>
    </div>
  </div>);}

// MIJN PUNTEN
function MijnPunten({matches,bvs,pmAll,pbAll,jAll,pvAll,fpAll,adminFP,users,spelerStats,config,koMatches,koPronosAll,koPunten,cur}){
  const echteUserIds=new Set(users.filter(u=>!u.is_admin&&!u.is_test).map(u=>u.id));
  const pt=avgPT(pvAll.filter(p=>echteUserIds.has(p.user_id)));
  const teldatum=config.bijvragen_teldatum||'';
  const telPunten=!teldatum||new Date()>=new Date(teldatum);
  const jids=(jAll[cur.id]||[]).map(j=>j.match_id);
  const{tot,det,matchDet}=calcPts(pmAll[cur.id]||{},pbAll[cur.id]||{},matches,bvs,jids,pt,spelerStats,teldatum);
  const{tot:koTot,det:koDet}=calcKOPts(koPronosAll[cur.id]||{},koMatches,koPunten);
  const{tot:kwalTot,det:kwalDet}=calcKwalPunten(pmAll[cur.id]||{},fpAll[cur.id]||{},matches,koPunten,adminFP);
  const totaal=tot+koTot+kwalTot;

  // Statistieken
  const aantalAllesJuist=matchDet.filter(m=>m.cat==='alles_juist').length;
  const aantalAllesFout=matchDet.filter(m=>m.cat==='alles_fout').length;
  const jokerPunten=matchDet.filter(m=>m.isJ).reduce((s,m)=>s+m.pts,0);
  const bijvraagPunten=det.filter(d=>d.cat==='bijvraag'||d.cat==='speler3').reduce((s,d)=>s+d.pts,0);

  // Categorielabels
  const CL={alles_juist:'Alles juist',een_juist_winnaar_juist:'1j+Win✓',niets_juist_winnaar_juist:'0j+Win✓',een_juist_winnaar_fout:'1j+Win✗',alles_fout:'Alles fout'};
  const CT={alles_juist:'tag-green',een_juist_winnaar_juist:'tag-green',niets_juist_winnaar_juist:'tag-gold',een_juist_winnaar_fout:'tag-gold',alles_fout:'tag-red'};

  // Groepen met gespeelde wedstrijden
  const mbg={};for(const m of matches){if(!mbg[m.group])mbg[m.group]=[];mbg[m.group].push(m);}
  const [openGroep,setOpenGroep]=useState(null);

  return(<div>
    <div className="section-title">📊 Mijn Punten</div>
    {cur.is_test&&<div className="info-test" style={{marginBottom:12}}>🧪 Testmodus — punten zijn ter illustratie.</div>}
    {teldatum&&!telPunten&&<div className="info" style={{borderColor:'var(--gold)',color:'var(--gold)',marginBottom:12}}>
      ⏳ Bijvraagpunten tellen mee vanaf <strong>{new Date(teldatum).toLocaleString('nl-BE')}</strong>
    </div>}

    {/* TOTAALOVERZICHT */}
    <div className="card">
      <div className="card-title">Totaaloverzicht</div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
        <span style={{fontWeight:600,fontSize:15}}>Totale punten</span>
        <span style={{fontFamily:'Bebas Neue',fontSize:26,color:'var(--gold)'}}>{fmt(totaal)}</span>
      </div>
      <div className="pts-row"><span>🎯 Groepsfase wedstrijden</span><span className="pp">{fmt(tot - bijvraagPunten)}</span></div>
      {bijvraagPunten!==0&&<div className="pts-row"><span>⭐ Bijvragen</span><span className="pp">{fmt(bijvraagPunten)}</span></div>}
      {kwalTot!==0&&<div className="pts-row"><span>🎫 KO-kwalificatie</span><span className="pp">{fmt(kwalTot)}</span></div>}
      {koTot!==0&&<div className="pts-row"><span>🏆 KO-fase</span><span className="pp">{fmt(koTot)}</span></div>}
    </div>

    {/* STATISTIEKEN */}
    <div className="grid3" style={{marginBottom:12}}>
      <div className="stat-box"><div className="stat-n" style={{color:'var(--green)'}}>{aantalAllesJuist}</div><div className="stat-l">Volledig juist</div></div>
      <div className="stat-box"><div className="stat-n" style={{color:'var(--red)'}}>{aantalAllesFout}</div><div className="stat-l">Volledig fout</div></div>
      <div className="stat-box"><div className="stat-n" style={{color:'var(--gold)'}}>{fmt(jokerPunten)}</div><div className="stat-l">Jokerpunten</div></div>
    </div>

    {/* PER GROEP */}
    {GRP.map(grp=>{
      const gMatches=matchDet.filter(m=>m.group===grp);
      if(!gMatches.length)return null;
      const grpPts=gMatches.reduce((s,m)=>s+m.pts,0);
      const isOpen=openGroep===grp;
      return(<div className="card" key={grp} style={{padding:0,overflow:'hidden'}}>
        {/* Header — klikbaar */}
        <div
          onClick={()=>setOpenGroep(isOpen?null:grp)}
          style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',cursor:'pointer',background:isOpen?'var(--dark3)':'transparent'}}
        >
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontFamily:'Bebas Neue',fontSize:17,color:'var(--green)',letterSpacing:1}}>Groep {grp}</span>
            <span style={{fontSize:11,color:'var(--muted)'}}>{gMatches.length} wedstrijden</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontFamily:'Bebas Neue',fontSize:20,color:grpPts>0?'var(--green)':grpPts<0?'var(--red)':'var(--muted)'}}>{grpPts>0?'+':''}{fmt(grpPts)}</span>
            <span style={{color:'var(--muted)',fontSize:14}}>{isOpen?'▲':'▼'}</span>
          </div>
        </div>
        {/* Detail wedstrijden */}
        {isOpen&&<div style={{borderTop:'1px solid var(--border)'}}>
          {gMatches.map((m,i)=>(
            <div key={m.matchId} style={{padding:'10px 14px',borderBottom:i<gMatches.length-1?'1px solid var(--border)':'none',background:'var(--dark3)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500}}>{m.home} – {m.away}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2,display:'flex',gap:6,flexWrap:'wrap'}}>
                    {m.homePred!=null
                      ?<><span>Jij: <strong style={{color:'var(--text)'}}>{m.homePred}–{m.awayPred}</strong></span>
                        <span>Uitslag: <strong style={{color:'var(--text)'}}>{m.homeScore}–{m.awayScore}</strong></span>
                      </>
                      :<span style={{color:'var(--red)'}}>Niet ingevuld</span>
                    }
                  </div>
                  <div style={{marginTop:4,display:'flex',gap:4,flexWrap:'wrap'}}>
                    {m.cat&&<span className={`tag ${CT[m.cat]}`}>{CL[m.cat]}</span>}
                    {m.wb>0&&<span className="tag tag-blue">+{m.wb}w</span>}
                    {m.isJ&&<span className="tag tag-gold">🃏×2</span>}
                    {!m.cat&&m.homePred==null&&<span className="tag tag-gray">Niet ingevuld</span>}
                  </div>
                </div>
                <div style={{fontFamily:'Bebas Neue',fontSize:20,color:m.pts>0?'var(--green)':m.pts<0?'var(--red)':'var(--muted)',flexShrink:0}}>
                  {m.pts>0?'+':''}{fmt(m.pts)}
                </div>
              </div>
            </div>
          ))}
          <div style={{display:'flex',justifyContent:'flex-end',padding:'8px 14px',borderTop:'1px solid var(--border)',background:'var(--dark2)'}}>
            <span style={{fontSize:12,color:'var(--muted)',marginRight:8}}>Totaal groep {grp}:</span>
            <span style={{fontFamily:'Bebas Neue',fontSize:16,color:grpPts>0?'var(--green)':grpPts<0?'var(--red)':'var(--muted)'}}>{grpPts>0?'+':''}{fmt(grpPts)}</span>
          </div>
        </div>}
      </div>);
    })}

    {/* BIJVRAGEN */}
    {det.filter(d=>d.cat==='bijvraag'||d.cat==='speler3').length>0&&<div className="card">
      <div className="card-title">⭐ Bijvragen</div>

        <div className="pts-row" key={i}><span>{d.label}</span><span className="pp">+{fmt(d.pts)}</span></div>

    {/* KO-KWALIFICATIE */}
    {kwalDet.length>0&&<div className="card">
      <div className="card-title">🎫 KO-kwalificatie</div>
      {kwalDet.map((d,i)=>(
        <div className="pts-row" key={i}><span>{d.label}</span><span className="pp">+{fmt(d.pts)}</span></div>
      ))}
    </div>}

    {/* KO-FASE */}
    {koDet.length>0&&<div className="card">
      <div className="card-title">🏆 KO-fase</div>
      {koDet.map((d,i)=>(
        <div className="pts-row" key={i}><span>{d.label}</span><span className={d.pts>=0?'pp':'pn'}>{d.pts>=0?'+':''}{fmt(d.pts)}</span></div>

    {totaal===0&&matchDet.length===0&&<div style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:20}}>Nog geen wedstrijden gespeeld.</div>}
  </div>);
}

// UITLEG PAGINA + CHECKLIST
function Uitleg({config,cur,matches,bvs,pmAll,pbAll,jAll,fpAll,pvAll,setPage}){
  const tekst=config.uitleg||'';
  const paragrafen=tekst.split('\n').filter(r=>r.trim()!=='');

  // ─── CHECKLIST BEREKENING ───────────────────────────────────────────────
  const myPM=pmAll[cur.id]||{};
  const myPB=pbAll[cur.id]||{};
  const myJ=(jAll[cur.id]||[]);
  const myFP=fpAll[cur.id]||{};
  const myPV=pvAll.find(p=>p.user_id===cur.id);

  // Wedstrijden & jokers & fairplay per groep
  const mbg={};
  for(const m of matches){if(!mbg[m.group])mbg[m.group]=[];mbg[m.group].push(m);}

  const groepStatus=GRP.map(grp=>{
    const gm=mbg[grp]||[];
    if(gm.length===0)return null;
    // Teams in deze groep
    const teams=new Set();
    for(const m of gm){if(m.home)teams.add(m.home);if(m.away)teams.add(m.away);}
    const aantalMatches=gm.length;
    const ingevuld=gm.filter(m=>{const p=myPM[m.id];return p&&p.home_pred!=null&&p.away_pred!=null;}).length;
    const heeftJoker=myJ.some(j=>j.group===grp);
    // Fairplay: check of er een geldige ranking is voor deze groep
    let fpVal=myFP[grp];
    if(typeof fpVal==='string'){try{fpVal=JSON.parse(fpVal);}catch{fpVal=null;}}
    const heeftFP=Array.isArray(fpVal)&&fpVal.length===teams.size;
    return{grp,aantalMatches,ingevuld,volledig:ingevuld===aantalMatches,heeftJoker,heeftFP};
  }).filter(Boolean);

  // Bijvragen
  const aantalBv=bvs.length;
  const ingevuldBv=bvs.filter(bv=>{
    if(bv.type==='speler3'){
      // Minstens 1 naam ingevuld telt als ingevuld
      return [1,2,3].some(i=>{const a=myPB[bv.id+`_${i}`];return a&&a.trim()!=='';});
    }
    const a=myPB[bv.id];
    return a&&a.trim()!=='';
  }).length;
  const bvVolledig=aantalBv>0&&ingevuldBv===aantalBv;

  // Puntenvragen
  const pvIngevuld=myPV&&['alles_juist','een_juist_winnaar_juist','niets_juist_winnaar_juist','een_juist_winnaar_fout','alles_fout'].every(k=>myPV[k]!==null&&myPV[k]!==undefined);

  // Betaalstatus
  const betaald=cur.betaald;

  // Totale voortgang
  const checks=[
    ...groepStatus.map(g=>g.volledig),
    ...groepStatus.map(g=>g.heeftJoker),
    ...groepStatus.map(g=>g.heeftFP),
    bvVolledig,
    pvIngevuld,
    betaald,
  ];
  const totaalOk=checks.filter(Boolean).length;
  const totaal=checks.length;
  const pct=totaal>0?Math.round(totaalOk/totaal*100):0;

  function CheckRow({ok,label,sub,onClick}){
    return(
      <div onClick={onClick} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:'1px solid var(--border)',cursor:onClick?'pointer':'default'}}
        onMouseEnter={e=>{if(onClick)e.currentTarget.style.background='var(--dark3)';}}
        onMouseLeave={e=>{e.currentTarget.style.background='';}}
      >
        <div style={{fontSize:18,width:24,textAlign:'center',flexShrink:0}}>{ok?'✅':'⬜'}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,color:ok?'var(--text)':'var(--muted)',fontWeight:ok?400:400}}>{label}</div>
          {sub&&<div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>{sub}</div>}
        </div>
        {onClick&&<div style={{fontSize:11,color:'var(--green)',flexShrink:0}}>→</div>}
      </div>
    );
  }

  return(<div>
    <div className="section-title">📖 Handleiding</div>

    {/* UITLEG TEKST — bovenaan */}
    {tekst&&<div className="card">
      {paragrafen.map((p,i)=>(
        <p key={i} style={{fontSize:13,lineHeight:1.7,marginBottom:i<paragrafen.length-1?10:0,color:'var(--text)'}}>{p}</p>
      ))}
    </div>}
    {!tekst&&<div className="card" style={{color:'var(--muted)',fontSize:13}}>De admin heeft nog geen uitleg toegevoegd.</div>}

    {/* VOORTGANGSBALK */}
    <div className="card" style={{marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div className="card-title" style={{margin:0}}>✅ Mijn voortgang</div>
        <div style={{fontFamily:'Bebas Neue',fontSize:22,color:pct===100?'var(--green)':'var(--gold)'}}>{pct}%</div>
      </div>
      <div style={{height:8,background:'var(--dark3)',borderRadius:4,overflow:'hidden',marginBottom:6}}>
        <div style={{height:'100%',width:`${pct}%`,background:pct===100?'var(--green)':'var(--gold)',borderRadius:4,transition:'width .5s'}}/>
      </div>
      <div style={{fontSize:11,color:'var(--muted)'}}>{totaalOk} van {totaal} onderdelen voltooid</div>
    </div>

    {/* BETALING */}
    <div className="card">
      <div className="card-title" style={{fontSize:15}}>💶 Betaling</div>
      <CheckRow ok={betaald} label={betaald?'Betaald ✓':'Nog niet betaald'} sub={betaald?'':'Contacteer de admin om je betaling te registreren'}/>
    </div>

    {/* PUNTENVRAGEN */}
    <div className="card">
      <div className="card-title" style={{fontSize:15}}>🎚️ Puntenvragen</div>
      <CheckRow ok={pvIngevuld} label={pvIngevuld?'Puntenverdeling ingevuld':'Puntenverdeling nog niet ingevuld'} sub="Geef aan hoeveel punten elke categorie waard is" onClick={()=>setPage('pv')}/>
    </div>

    {/* BIJVRAGEN */}
    <div className="card">
      <div className="card-title" style={{fontSize:15}}>⭐ Bijvragen</div>
      {aantalBv===0
        ?<div style={{fontSize:12,color:'var(--muted)'}}>Nog geen bijvragen beschikbaar.</div>
        :<CheckRow ok={bvVolledig} label={`${ingevuldBv} van ${aantalBv} bijvragen ingevuld`} sub={bvVolledig?'Alle bijvragen zijn ingevuld':'Vul alle bijvragen in voor de deadline'} onClick={()=>setPage('prono','bijvragen')}/>
      }
    </div>

    {/* PER GROEP */}
    <div className="card">
      <div className="card-title" style={{fontSize:15}}>📋 Wedstrijden, Jokers & Fairplay</div>
      {groepStatus.map(g=>(
        <div key={g.grp}>
          <div style={{fontSize:11,fontFamily:'Bebas Neue',letterSpacing:1,color:'var(--muted)',padding:'8px 0 4px',borderTop:'1px solid var(--border)'}}>GROEP {g.grp}</div>
          <CheckRow ok={g.volledig} label={`Wedstrijden: ${g.ingevuld}/${g.aantalMatches} ingevuld`} onClick={()=>setPage('prono',g.grp)}/>
          <CheckRow ok={g.heeftJoker} label={g.heeftJoker?'Joker gekozen ✓':'Joker nog niet gekozen'} sub="Kies 1 wedstrijd als joker (dubbele punten)" onClick={()=>setPage('prono',g.grp)}/>
          <CheckRow ok={g.heeftFP} label={g.heeftFP?'Fairplay ranking ingevuld ✓':'Fairplay ranking nog niet ingevuld'} sub="Sleep de ploegen in volgorde van beste fairplay" onClick={()=>setPage('prono',g.grp)}/>
        </div>
      ))}
    </div>

  </div>);}

// SPELER STAT RIJ — lokale state om verspringen te voorkomen
function SpelerStatRow({s,isKeeper,bvId,onSave,onDel}){
  const[v1,setV1]=useState(String(s.stat1));
  const[v2,setV2]=useState(String(s.stat2));
  const[v3,setV3]=useState(String(s.stat3));

      <>

        <td style={td}><input className="ii" type="number" style={{...inp,width:70}} value={v3} onChange={e=>setV3(e.target.value)} onBlur={e=>onSave(bvId,s.naam,'stat3',e.target.value)} min="1"/></td>
        <td style={{...td,color:'var(--gold)'}}>{score}</td>
      </>
    ):(
      <td style={td}><input className="ii" type="number" style={{...inp,width:70}} value={v1} onChange={e=>setV1(e.target.value)} onBlur={e=>onSave(bvId,s.naam,'stat1',e.target.value)} min="0"/></td>
    )}
    <td style={{padding:'5px 6px',borderBottom:'1px solid var(--border)'}}><button className="btn btn-sm btn-danger" onClick={()=>onDel(bvId,s.naam)}>✕</button></td>
  </tr>);
}

// BIJVRAGEN SORTEERLIJST (admin)
function BvSortList({bvs,setBvField,setBvAns,delBv,saveBvOrder}){
  const[order,setOrder]=useState(bvs.map(b=>b.id));
  const dragIdx=useRef(null);
  const touchStartY=useRef(null);
  const touchItem=useRef(null);

  useEffect(()=>setOrder(bvs.map(b=>b.id)),[JSON.stringify(bvs.map(b=>b.id))]);

  function getOrdered(){return order.map(id=>bvs.find(b=>b.id===id)).filter(Boolean);}

  function move(from,to){
    const newOrder=[...order];
    const[moved]=newOrder.splice(from,1);
    newOrder.splice(to,0,moved);
    setOrder(newOrder);
    saveBvOrder(newOrder);
  }

  function onDragStart(i){dragIdx.current=i;}
  function onDragOver(e,i){e.preventDefault();if(dragIdx.current===null||dragIdx.current===i)return;move(dragIdx.current,i);dragIdx.current=i;}
  function onDragEnd(){dragIdx.current=null;}
  function onTouchStart(e,i){touchStartY.current=e.touches[0].clientY;touchItem.current=i;}
  function onTouchMove(e){
    e.preventDefault();
    const dy=e.touches[0].clientY-touchStartY.current;
    const steps=Math.round(dy/70);
    if(steps===0||touchItem.current===null)return;
    const newIdx=Math.max(0,Math.min(order.length-1,touchItem.current+steps));
    if(newIdx===touchItem.current)return;
    move(touchItem.current,newIdx);
    touchStartY.current=e.touches[0].clientY;
    touchItem.current=newIdx;
  }
  function onTouchEnd(){touchItem.current=null;}

  return(<div>
    {getOrdered().map((bv,i)=>(
      <div key={bv.id}
        className="bv-card"
        draggable
        onDragStart={()=>onDragStart(i)}
        onDragOver={e=>onDragOver(e,i)}
        onDragEnd={onDragEnd}
        onTouchStart={e=>onTouchStart(e,i)}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        style={{marginBottom:8,cursor:'grab'}}
      >
        <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:6,flexWrap:'wrap'}}>
          {/* Sleep-handle + pijltjes */}
          <div style={{display:'flex',flexDirection:'column',gap:1,flexShrink:0}}>
            <button style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',padding:'1px 4px',fontSize:11,lineHeight:1}} onClick={()=>i>0&&move(i,i-1)} title="Omhoog">▲</button>
            <div style={{color:'var(--muted)',fontSize:16,textAlign:'center',cursor:'grab',userSelect:'none'}}>⠿</div>
            <button style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',padding:'1px 4px',fontSize:11,lineHeight:1}} onClick={()=>i<order.length-1&&move(i,i+1)} title="Omlaag">▼</button>
          </div>
          <input className="ii" style={{flex:1,minWidth:120,fontWeight:600}} defaultValue={bv.question} onBlur={e=>setBvField(bv.id,'question',e.target.value)} placeholder="Vraag..."/>
          <input className="ii" style={{width:50}} type="number" defaultValue={bv.points} onBlur={e=>setBvField(bv.id,'points',parseInt(e.target.value)||bv.points)} min={1}/>
          <select className="ii" defaultValue={bv.type} onBlur={e=>setBvField(bv.id,'type',e.target.value)}>
            <option value="team">🌍 Land</option>
            <option value="player">👤 Speler</option>
            <option value="number">🔢 Getal</option>
            <option value="text">📝 Vrij</option>
          </select>
          <button className="btn btn-sm btn-danger" onClick={()=>delBv(bv.id)}>✕</button>
        </div>
        {bv.type==='team'
          ?<select className="ii" style={{width:'100%'}} defaultValue={bv.correct_answer||''} onBlur={e=>setBvAns(bv.id,e.target.value)}>
            <option value="">— Nog niet bekend —</option>
            {WK_LANDEN.map(l=><option key={l} value={l}>{l}</option>)}
          </select>
          :bv.type==='number'
            ?<input className="ii" type="number" inputMode="numeric" min="0" style={{width:'100%'}} defaultValue={bv.correct_answer||''} onBlur={e=>setBvAns(bv.id,e.target.value)} placeholder="Correct antwoord (getal)"/>
            :<input className="ii" style={{width:'100%'}} defaultValue={bv.correct_answer||''} onBlur={e=>setBvAns(bv.id,e.target.value)} placeholder="Correct antwoord"/>
        }
        <div style={{fontSize:10,color:'var(--muted)',marginTop:4}}>Klik buiten het veld om op te slaan.</div>
      </div>
    ))}
  </div>);}

// ADMIN
// TEST TABBLAD
function TestTab({matches,bvs,koMatches,config,ag,setAg,onRefresh}){
  const[testData,setTestData]=useState(()=>{try{return JSON.parse(config.test_data||'{}');}catch{return{};}});
  const[bezig,setBezig]=useState(false);
  const[msg,setMsg]=useState('');
  const[confirmWis,setConfirmWis]=useState(false);
  const[confirmInvul,setConfirmInvul]=useState(false);

  useEffect(()=>{try{setTestData(JSON.parse(config.test_data||'{}'));}catch{}},[config.test_data]);

  async function saveTestData(nieuw){
    setTestData(nieuw);
    await sb.from('config').upsert({key:'test_data',value:JSON.stringify(nieuw)});
  }

  async function invullenAlles(){
    setBezig(true);setMsg('');
    try{
      await Promise.all(matches.filter(m=>GRP.includes(m.group)).map(m=>{
        const td=testData.matches?.[m.id]||{h:2,a:1};
        return sb.from('matches').update({home_score:td.h,away_score:td.a}).eq('id',m.id);
      }));
      await Promise.all(koMatches.map(m=>{
        const w=testData.ko?.[m.id];
        if(!w)return null;
        return sb.from('ko_matches').update({winner:w}).eq('id',m.id);
      }).filter(Boolean));
      await Promise.all(bvs.filter(b=>testData.bvs?.[b.id]).map(b=>
        sb.from('bijvragen').update({correct_answer:testData.bvs[b.id]}).eq('id',b.id)
      ));
      if(testData.fairplay){
        await Promise.all(Object.entries(testData.fairplay).map(([grp,ranking])=>
          sb.from('fairplay').upsert({user_id:'admin',group:grp,team:JSON.stringify(ranking)},{onConflict:'user_id,group'})
        ));
      }
      setMsg('✅ Testdata succesvol ingevuld!');
      onRefresh();
    }catch(e){setMsg('❌ Fout: '+e.message);}
    setBezig(false);setConfirmInvul(false);
  }

  async function wissenAlles(){
    setBezig(true);setMsg('');
    try{
      await Promise.all(matches.filter(m=>GRP.includes(m.group)).map(m=>
        sb.from('matches').update({home_score:null,away_score:null}).eq('id',m.id)
      ));
      await Promise.all(koMatches.map(m=>sb.from('ko_matches').update({winner:null}).eq('id',m.id)));
      await Promise.all(bvs.map(b=>sb.from('bijvragen').update({correct_answer:''}).eq('id',b.id)));
      await sb.from('fairplay').delete().eq('user_id','admin');
      setMsg('✅ Alle testdata gewist!');
      onRefresh();
    }catch(e){setMsg('❌ Fout: '+e.message);}
    setBezig(false);setConfirmWis(false);
  }

  return(<div>
    <div className="card">
      <div className="card-title">🧪 Testdata beheer</div>
      <div style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>Vul hieronder de testwaarden in, sla ze op, en gebruik dan de knoppen om ze in één keer in te vullen of te wissen.</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
        {confirmInvul
          ?<div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:12,color:'var(--gold)'}}>⚠️ Dit overschrijft alle huidige uitslagen/antwoorden. Zeker?</span>
            <button className="btn btn-sm btn-outline" disabled={bezig} onClick={invullenAlles}>{bezig?'Bezig...':'Ja, invullen'}</button>
            <button className="btn btn-sm" style={{background:'var(--dark3)',color:'var(--muted)',border:'1px solid var(--border)'}} onClick={()=>setConfirmInvul(false)}>Annuleer</button>
          </div>
          :<button className="btn btn-sm btn-outline" onClick={()=>setConfirmInvul(true)}>▶ Testdata invullen</button>
        }
        {confirmWis
          ?<div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:12,color:'var(--red)'}}>⚠️ Dit wist ALLE uitslagen, KO-winnaars, bijvragen én fairplay. Zeker?</span>
            <button className="btn btn-sm btn-danger" disabled={bezig} onClick={wissenAlles}>{bezig?'Bezig...':'Ja, alles wissen'}</button>
            <button className="btn btn-sm" style={{background:'var(--dark3)',color:'var(--muted)',border:'1px solid var(--border)'}} onClick={()=>setConfirmWis(false)}>Annuleer</button>
          </div>
          :<button className="btn btn-sm btn-danger" onClick={()=>setConfirmWis(true)}>✕ Alles wissen</button>
        }
      </div>
      {msg&&<div style={{fontSize:12,color:msg.startsWith('✅')?'var(--green)':'var(--red)',marginTop:4}}>{msg}</div>}
    </div>

    <div className="card">
      <div className="card-title">⚽ Testuitslagen groepsfase</div>
      <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>Stel per wedstrijd de testuitslag in. Klik buiten het veld om op te slaan.</div>
      <div className="groep-tabs" style={{marginBottom:10}}>{GRP.map(g=><div key={g} className={`groep-tab ${ag===g?'active':''}`} onClick={()=>setAg(g)}>{g}</div>)}</div>
      {matches.filter(m=>m.group===ag).map(m=>{
        const td=testData.matches?.[m.id]||{};
        return(<div key={m.id} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
          <div style={{flex:1,fontSize:12}}>{m.home} – {m.away}</div>
          <input className="ii" type="number" min="0" style={{width:34,textAlign:'center'}}
            defaultValue={td.h??2}
            onBlur={e=>saveTestData({...testData,matches:{...testData.matches,[m.id]:{...td,h:parseInt(e.target.value)||0}}})}
          />
          <span style={{color:'var(--muted)'}}>–</span>
          <input className="ii" type="number" min="0" style={{width:34,textAlign:'center'}}
            defaultValue={td.a??1}
            onBlur={e=>saveTestData({...testData,matches:{...testData.matches,[m.id]:{...td,a:parseInt(e.target.value)||0}}})}
          />
        </div>);
      })}
    </div>

    {koMatches.length>0&&<div className="card">
      <div className="card-title">🏆 Test KO-winnaars</div>
      <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>Stel per KO-wedstrijd de testwinnaar in.</div>
      {[['R32','Ronde van 32'],['R16','Ronde van 16'],['KF','Kwartfinales'],['HF','Halve finales'],['KF3','Kleine finale'],['F','Finale']].map(([round,label])=>{
        const rMatches=koMatches.filter(m=>m.round===round);
        if(!rMatches.length)return null;
        return(<div key={round} style={{marginBottom:12}}>
          <div style={{fontSize:11,fontFamily:'Bebas Neue',letterSpacing:1,color:'var(--muted)',marginBottom:4}}>{label}</div>
          {rMatches.map(m=>{
            const teams=[m.home,m.away].filter(t=>t&&!t.startsWith('W-')&&!t.startsWith('VL-'));
            return(<div key={m.id} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid var(--border)'}}>
              <div style={{flex:1,fontSize:12}}>{m.home} vs {m.away}</div>
              <select className="ii" style={{minWidth:120}}
                value={testData.ko?.[m.id]||''}
                onChange={e=>saveTestData({...testData,ko:{...testData.ko,[m.id]:e.target.value||undefined}})}
              >
                <option value="">— Kies —</option>
                {teams.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>);
          })}
        </div>);
      })}
    </div>}

    {bvs.filter(b=>b.type!=='speler3').length>0&&<div className="card">

            if(m.round==='R32')return[m.home,m.away].filter(t=>t&&!t.startsWith('W-')&&!t.startsWith('VL-'));
            if(m.round==='KF3'){
              const hfMatches=koMatches.filter(x=>x.round==='HF').sort((a,b)=>a.position-b.position);
              const verliezers=hfMatches.flatMap(hm=>{

// MAIN
function App(){
  const[user,setUser]=useState(null),[page,setPage]=useState('klassement'),[load,setLoad]=useState(true);
  const[pronoTab,setPronoTab]=useState('bijvragen');
  const[users,setUsers]=useState([]),[matches,setMatches]=useState([]),[bvs,setBvs]=useState([]);
  const[pmAll,setPmAll]=useState({}),[pbAll,setPbAll]=useState({}),[jAll,setJAll]=useState({}),[pvAll,setPvAll]=useState([]);
  const[fpAll,setFpAll]=useState({}),[config,setConfig]=useState({}),[spelerStats,setSpelerStats]=useState([]);
  const[koMatches,setKoMatches]=useState([]),[koPronosAll,setKoPronosAll]=useState({}),[koPunten,setKoPunten]=useState({});
  const[fifaRanking,setFifaRanking]=useState([]);

  async function loadAll(){
    const[{data:us},{data:ma},{data:bv},{data:pm},{data:pb},{data:jk},{data:pv},{data:fp},{data:cfg},{data:ss},{data:km},{data:kp},{data:kpt},{data:fr}]=await Promise.all([
      sb.from('users').select('*'),sb.from('matches').select('*').order('date'),sb.from('bijvragen').select('*').order('sort_order'),
      sb.from('pronos_matches').select('*'),sb.from('pronos_bijvragen').select('*'),sb.from('jokers').select('*'),
      sb.from('punten_vragen').select('*'),sb.from('fairplay').select('*'),sb.from('config').select('*'),
      sb.from('speler_stats').select('*'),
      sb.from('ko_matches').select('*').order('round_order').order('position'),
      sb.from('ko_pronos').select('*'),
      sb.from('ko_punten').select('*'),
      sb.from('fifa_ranking').select('*').order('rank'),
    ]);
    setUsers(us||[]);setMatches(ma||[]);setBvs(bv||[]);
    const pmM={};for(const p of(pm||[])){if(!pmM[p.user_id])pmM[p.user_id]={};pmM[p.user_id][p.match_id]=p;}setPmAll(pmM);
    const pbM={};for(const p of(pb||[])){if(!pbM[p.user_id])pbM[p.user_id]={};pbM[p.user_id][p.bv_id]=p.answer;}setPbAll(pbM);
    const jM={};for(const j of(jk||[])){if(!jM[j.user_id])jM[j.user_id]=[];jM[j.user_id].push(j);}setJAll(jM);
    // fairplay: team-veld bevat JSON-array van ranking
    const fpM={};for(const f of(fp||[])){
      if(!fpM[f.user_id])fpM[f.user_id]={};
      let val=f.team;try{val=JSON.parse(f.team);}catch{}
      fpM[f.user_id][f.group]=val;
    }setFpAll(fpM);
    setPvAll(pv||[]);setSpelerStats(ss||[]);
    setKoMatches(km||[]);
    const kpM={};for(const p of(kp||[])){if(!kpM[p.user_id])kpM[p.user_id]={};kpM[p.user_id][p.match_id]=p.winner_pred;}setKoPronosAll(kpM);
    const kptM={};for(const k of(kpt||[]))kptM[k.round]=k.points;setKoPunten(kptM);
    setFifaRanking(fr||[]);
    const cfgObj={};for(const c of(cfg||[]))cfgObj[c.key]=c.value;setConfig(cfgObj);
    setLoad(false);
  }
  useEffect(()=>{loadAll();},[]);
  useEffect(()=>{const t=setInterval(loadAll,30000);return()=>clearInterval(t);},[]);

  if(load)return<div className="spinner">⚽ Laden...</div>;
  if(!user)return<Login onLogin={u=>{setUser(u);setPage(u.is_admin?'admin':'uitleg');}}/>;

  const freshUser=users.find(u=>u.id===user.id)||user;
  const nav=[
    {id:'uitleg',icon:'📖',label:'Handleiding'},
    {id:'klassement',icon:'🏆',label:'Klassement'},
    {id:'prono',icon:'📋',label:'Pronostiek'},
    {id:'pv',icon:'🎚️',label:'Punten'},
    {id:'mijnpunten',icon:'📊',label:'Mijn punten'},
    ...(user.is_admin?[{id:'admin',icon:'⚙️',label:'Beheer'}]:[]),
  ];

  return(<div className="app">
    <div className="topbar">
      <div className="topbar-title">⚽ WK <span>2026</span></div>
      <div className="user-badge">
        <strong>{user.name}</strong>
        {user.is_admin&&<span className="badge-admin">ADMIN</span>}
        {freshUser.is_test&&<span className="badge-test">TEST</span>}
        {!user.is_admin&&!freshUser.is_test&&!freshUser.betaald&&<span className="tag tag-niet-betaald">⚠</span>}
        <button className="btn-logout" onClick={()=>setUser(null)}>Uit</button>
      </div>
    </div>
    <div className="main">
      {/* Desktop sidebar */}
      <div className="sidebar">
        {nav.map(n=><div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
          <span style={{fontSize:15,width:18,textAlign:'center'}}>{n.icon}</span>{n.label}
        </div>)}
      </div>
      <div className="content">
        {page==='uitleg'&&<Uitleg config={config} cur={freshUser} matches={matches} bvs={bvs} pmAll={pmAll} pbAll={pbAll} jAll={jAll} fpAll={fpAll} pvAll={pvAll} setPage={(p,t)=>{setPage(p);if(t)setPronoTab(t);}}/>}
        {page==='klassement'&&<Klassement users={users} matches={matches} bvs={bvs} pmAll={pmAll} pbAll={pbAll} jAll={jAll} pvAll={pvAll} fpAll={fpAll} adminFP={fpAll['admin']||{}} spelerStats={spelerStats} config={config} koMatches={koMatches} koPronosAll={koPronosAll} koPunten={koPunten} fifaRanking={fifaRanking} cur={freshUser}/>}
        {page==='prono'&&<Pronostiek matches={matches} bvs={bvs} pmAll={pmAll} pbAll={pbAll} jAll={jAll} fpAll={fpAll} cur={freshUser} config={config} spelerStats={spelerStats} koMatches={koMatches} koPronosAll={koPronosAll} koPunten={koPunten} fifaRanking={fifaRanking} initialTab={pronoTab} onRefresh={loadAll}/>}
        {page==='pv'&&<PuntenVragen cur={freshUser} pvAll={pvAll} users={users} onRefresh={loadAll}/>}
        {page==='mijnpunten'&&<MijnPunten matches={matches} bvs={bvs} pmAll={pmAll} pbAll={pbAll} jAll={jAll} pvAll={pvAll} fpAll={fpAll} adminFP={fpAll['admin']||{}} users={users} spelerStats={spelerStats} config={config} koMatches={koMatches} koPronosAll={koPronosAll} koPunten={koPunten} cur={freshUser}/>}
        {page==='admin'&&user.is_admin&&<Admin matches={matches} bvs={bvs} users={users} config={config} spelerStats={spelerStats} pbAll={pbAll} pvAll={pvAll} koMatches={koMatches} koPunten={koPunten} fifaRanking={fifaRanking} fpAll={fpAll} onRefresh={loadAll}/>}
      </div>
    </div>
    {/* Mobile bottom nav */}
    <nav className="bottom-nav">
      <div className="bottom-nav-items">
        {nav.map(n=><button key={n.id} className={`bn-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
          <span className="bn-icon">{n.icon}</span>
          <span>{n.label}</span>
        </button>)}
      </div>
    </nav>
  </div>);}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
